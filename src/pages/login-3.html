<!DOCTYPE html>
<html lang="uk">

<head>
	<meta charset="UTF-8">
	<meta content="width=device-width, initial-scale=1.0" name="viewport">
	<title>Відновлення пароля — Kaban</title>
	<meta content="Забули пароль? Введіть номер телефону або email — надішлемо посилання для створення нового пароля."
		name="description">

	<link href="https://kaban.com/reset-password" rel="canonical">

	<meta property="og:title" content="">
	<meta property="og:description" content="">
	<meta property="og:image" content="">
	<meta property="og:url" content="">
	<meta property="og:type" content="">

	<link rel="preload" as="font" href="/assets/fonts/InterRegular.woff2" type="font/woff2" crossorigin>
	<link rel="preload" as="font" href="/assets/fonts/InterSemiBold.woff2" type="font/woff2" crossorigin>

	<link rel="stylesheet" href="/styles/main.css">

	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "BreadcrumbList",
		"itemListElement": [
			{
				"@type": "ListItem",
				"position": 1,
				"name": "Головна",
				"item": "https://kaban.com/"
			},
			{
				"@type": "ListItem",
				"position": 2,
				"name": "Особистий кабінет",
				"item": "https://kaban.com/account"
			},
			{
				"@type": "ListItem",
				"position": 3,
				"name": "Відновити пароль"
			}
		]
	}
	</script>
</head>

<body class="min-h-screen flex flex-col bg-body pb-12.75 md:pb-15.5 lg:pb-0">

	<a class="skip-link" href="#main-content">Перейти до основного контенту</a>

	{{> header}}

	<main class="flex-1" id="main-content">

		<div class="page-wrapper">
			<div class="container">
				<nav aria-label="Breadcrumb">
					<ol class="breadcrumb mb-5 md:mb-10">
						<li><a href="/" class="breadcrumb__link">Головна</a></li>
						<li class="breadcrumb__separator" aria-hidden="true">/</li>
						<li><a href="/" class="breadcrumb__link">Особистий кабінет</a></li>
						<li class="breadcrumb__separator" aria-hidden="true">/</li>
						<li aria-current="page" class="breadcrumb__current">Відновити пароль</li>
					</ol>
				</nav>
				<section>
					<h1 class="h1 mb-3 md:mb-5">Забули пароль?</h1>
					<p class="mb-7.5 max-w-[646px] lg:max-w-[766px]">Будь ласка, введіть номер телефону або адресу
						електронної пошти. Ви отримаєте посилання
						для створення нового пароля електронною поштою.</p>
					<div class="grid grid-cols-12 gap-7.5">
						<div class="col-span-12 lg:col-span-5">
							<form action="/" aria-label="Форма відновлення пароля"
								class="bg-white rounded-2xl py-5 px-5 lg:py-7.5">
								<div class="mb-2.5">
									<label for="phone" class="form-label">Номер телефону або адреса електронної пошти
										<span class="text-accent">*</span></label>
									<input type="text" class="form-input" placeholder="+380" id="phone">
								</div>
								<div>
									<button type="submit" class="btn btn--orange w-full">Скинути пароль</button>
								</div>
							</form>
						</div>
					</div>
				</section>
			</div>
		</div>

	</main>

	{{> footer}}

	<script defer src="/js/main.js" type="module"></script>
</body>

</html>
