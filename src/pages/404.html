<!DOCTYPE html>
<html lang="uk">

<head>
	<meta charset="UTF-8">
	<meta content="width=device-width, initial-scale=1.0" name="viewport">
	<title>Сторінка не знайдена — Kaban</title>
	<meta
		content="Сторінка не знайдена або знаходиться в розробці. Поверніться на головну сторінку Kaban."
		name="description">

	<link href="https://kaban.com/404" rel="canonical">

	<meta property="og:title" content="">
	<meta property="og:description" content="">
	<meta property="og:image" content="">
	<meta property="og:url" content="">
	<meta property="og:type" content="">

	<link rel="preload" as="font" href="/assets/fonts/InterRegular.woff2" type="font/woff2" crossorigin>
	<link rel="preload" as="font" href="/assets/fonts/InterSemiBold.woff2" type="font/woff2" crossorigin>

	<link rel="stylesheet" href="/styles/main.css">

	<link rel="preload" as="image" href="/assets/images/404-image.svg" fetchpriority="high">
	<link rel="preload" as="image" href="/assets/images/404-title.svg" fetchpriority="high">
</head>

<body class="min-h-screen flex flex-col bg-body pb-12.75 md:pb-15.5 lg:pb-0">

	<a class="skip-link" href="#main-content">Перейти до основного контенту</a>

	{{> header}}

	<main class="flex-1" id="main-content">

		<div class="page-wrapper">
			<div class="container">
				<div class="text-center">
					<img src="/assets/images/404-image.svg" alt="" role="presentation" width="421" height="443" fetchpriority="high"
						class="mx-auto relative -mb-9">
					<h1 class="mb-3.75">
						<img src="/assets/images/404-title.svg" alt="404" width="382" height="126" fetchpriority="high"
							class="mx-auto">
					</h1>
					<p class="text-sm md:text-base md:leading-[1.75] mb-3.75">Сторінка не знайдена або знаходиться в розробці
					</p>
					<a href="/" class="btn btn--orange">На головну</a>
				</div>
			</div>
		</div>

	</main>

	{{> footer}}

	<script defer src="/js/main.js" type="module"></script>
</body>

</html>
