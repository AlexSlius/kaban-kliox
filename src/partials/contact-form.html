<section aria-labelledby="contact-form-heading">
    <h2 class="section-heading mb-8" id="contact-form-heading">Напишіть нам</h2>

    <form action="#" class="flex flex-col gap-6 max-w-xl" method="post" novalidate>

        <div>
            <label class="form-label" for="contact-name">
                Ваше ім'я <span aria-hidden="true" class="text-red-500">*</span>
            </label>
            <input
                    autocomplete="name"
                    class="form-input"
                    id="contact-name"
                    name="name"
                    placeholder="Іван Петренко"
                    required
                    type="text"
            >
        </div>

        <div>
            <label class="form-label" for="contact-email">
                Електронна пошта <span aria-hidden="true" class="text-red-500">*</span>
            </label>
            <input
                    autocomplete="email"
                    class="form-input"
                    id="contact-email"
                    name="email"
                    placeholder="ivan@example.com"
                    required
                    type="email"
            >
        </div>

        <div>
            <label class="form-label" for="contact-phone">Телефон</label>
            <input
                    autocomplete="tel"
                    class="form-input"
                    id="contact-phone"
                    name="phone"
                    placeholder="+38 (050) 000-00-00"
                    type="tel"
            >
        </div>

        <div>
            <label class="form-label" for="contact-message">
                Повідомлення <span aria-hidden="true" class="text-red-500">*</span>
            </label>
            <textarea
                    class="form-input resize-y"
                    id="contact-message"
                    name="message"
                    placeholder="Ваше запитання або повідомлення..."
                    required
                    rows="5"
                    style="min-height: 120px;"
            ></textarea>
        </div>

        <div>
            <button class="btn-primary w-full sm:w-auto" type="submit">
                Надіслати повідомлення
            </button>
        </div>

    </form>
</section>
