<section class="bg-white rounded-2xl p-5 lg:p-7.5" aria-labelledby="contact-form-heading">
	<h2 class="h2 mb-2.5" id="contact-form-heading">Зворотній зв'язок</h2>
	<p class="mb-5 text-sm leading-4.25">Заповніть форму нижче — наш менеджер скоро з вами зв'яжеться.</p>

	<form action="/" method="post" novalidate aria-label="Форма зворотного зв'язку">
		<div class="mb-2.5">
			<label class="form-label" for="contact-name">
				Прізвище та ім'я <span aria-hidden="true" class="text-accent">*</span>
			</label>
			<input class="form-input" id="contact-name" name="name" placeholder="Прізвище та ім'я отримувача" required
				type="text">
		</div>

		<div class="mb-2.5">
			<label class="form-label" for="contact-phone">
				Мобільний телефон <span aria-hidden="true" class="text-accent">*</span>
			</label>
			<input class="form-input js-phone" id="contact-phone" name="phone" placeholder="+380 (__) ___-__-__" required
				type="text">
		</div>

		<div class="mb-2.5">
			<label class="form-label" for="contact-email">Електронна пошта</label>
			<input class="form-input" id="contact-email" name="email" placeholder="Введіть E-mail" type="email">
		</div>

		<div class="mb-5">
			<label class="form-label" for="contact-message">Коментар до замовлення</label>
			<textarea class="form-input" id="contact-message" name="message" placeholder="" rows="4"></textarea>
		</div>

		<button class="btn btn--orange w-full" type="submit">Відправити</button>
	</form>
</section>
